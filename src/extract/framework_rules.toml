# Built-in framework detection rules.
#
# Each [[rules]] entry defines one detection rule.
# Fields:
#   import_pattern  — substring matched case-insensitively against the Import node name
#   language        — language filter ("python", "typescript", etc.; "" = any language)
#   framework_id    — stable ID used in graph nodes and has_framework() checks
#   display_name    — human-readable label shown in search results
#
# Rules are evaluated in order; more-specific patterns must appear before
# less-specific ones (e.g., "next/" before "react").
#
# User-defined rules from .oh/extractors/*.toml are merged after these at runtime.

# -------------------------------------------------------------------------
# Python frameworks
# -------------------------------------------------------------------------

[[rules]]
import_pattern = "fastapi"
language = "python"
framework_id = "fastapi"
display_name = "FastAPI"

[[rules]]
import_pattern = "flask"
language = "python"
framework_id = "flask"
display_name = "Flask"


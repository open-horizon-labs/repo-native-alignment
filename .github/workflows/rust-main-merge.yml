name: Rust CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: namespace-profile-cached
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: No language-specific conditionals in generic.rs
        run: |
          if grep -n 'language_name ==' src/extract/generic.rs; then
            echo "FAIL: language-specific logic in generic.rs — use LangConfig fields"
            exit 1
          fi
      - name: No linear scans on graph node/edge collections (warn)
        run: |
          # Warn (don't fail) about .iter().find() on graph collections.
          # Goal: migrate to HashMap-based lookups in service.rs and helpers.rs.
          # Line-based grep can't reliably exclude Rust test modules, so this is advisory.
          HITS=$(grep -rn 'graph_state\.nodes\.iter()\.find(\|gs\.nodes\.iter()\.find(' src/service.rs src/server/helpers.rs || true)
          if [ -n "$HITS" ]; then
            echo "WARN: nodes.iter().find() in production code — consider HashMap lookup"
            echo "$HITS"
          fi
      - name: No unnecessary clones of large collections
        run: |
          HITS=$(grep -rn '\.nodes\.clone()\|\.edges\.clone()' src/ --include='*.rs' | grep -v '#\[test\]' | grep -v '_test' || true)
          if [ -n "$HITS" ]; then
            echo "WARN: cloning nodes/edges vec — can you move instead?"
            echo "$HITS"
          fi

  test:
    runs-on: namespace-profile-cached
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure Namespace sccache cache
        run: nsc cache sccache setup --cache_name default >> "$GITHUB_ENV"

      - name: Cache Rust downloads
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git

      - name: Run all tests (debug profile)
        env:
          RUSTC_WRAPPER: "sccache"
        run: cargo test --no-default-features

  smoke:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    runs-on: namespace-profile-cached
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure Namespace sccache cache
        run: nsc cache sccache setup --cache_name default >> "$GITHUB_ENV"

      - name: Cache Rust downloads
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git

      - name: Build release binary
        env:
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --no-default-features

      - name: RNA pipeline smoke test (rna test)
        run: ./target/release/repo-native-alignment test --repo .github/fixtures/smoke
        timeout-minutes: 2

      - name: Build index for CLI smoke tests
        run: ./target/release/repo-native-alignment scan --path .github/fixtures/smoke
        timeout-minutes: 1

      - name: CLI search smoke test
        run: |
          OUTPUT=$(./target/release/repo-native-alignment search "hello" --repo .github/fixtures/smoke --limit 3 2>/dev/null)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Code symbols" || { echo "FAIL: search returned no results"; exit 1; }

      - name: CLI graph smoke test
        run: |
          NODE_ID=$(./target/release/repo-native-alignment search "hello" --repo .github/fixtures/smoke --limit 1 2>/dev/null | grep "ID:" | head -1 | sed 's/.*`\(.*\)`.*/\1/')
          echo "Node: $NODE_ID"
          OUTPUT=$(./target/release/repo-native-alignment graph --node "$NODE_ID" --mode neighbors --repo .github/fixtures/smoke 2>/dev/null)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "neighbors\|No results" || { echo "FAIL: graph returned unexpected output"; exit 1; }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MCP TypeScript SDK
        run: npm install --no-save @modelcontextprotocol/sdk

      - name: MCP stdio smoke test
        run: node .github/scripts/mcp-smoke.mjs ./target/release/repo-native-alignment .github/fixtures/smoke

  # M4-optimized build runs first (this is what developers install).
  # Warms sccache for the M1 baseline build that follows.
  build-release-fast:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: namespace-profile-tahoe
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure Namespace sccache cache
        run: nsc cache sccache setup --cache_name default >> "$GITHUB_ENV"

      - name: Cache Rust
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: rust

      - name: Build optimized release binary
        run: cargo build --release --target aarch64-apple-darwin
        env:
          RUSTFLAGS: "-C target-cpu=apple-m4 -C link-arg=-Wl,-dead_strip"
          RUSTC_WRAPPER: sccache

      - name: Strip and compress binary
        run: |
          strip target/aarch64-apple-darwin/release/repo-native-alignment
          tar czf repo-native-alignment-darwin-arm64-fast.tar.gz -C target/aarch64-apple-darwin/release repo-native-alignment

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-native-alignment-darwin-arm64-fast
          path: repo-native-alignment-darwin-arm64-fast.tar.gz
          retention-days: 30

  # M1 baseline after M4 (shares sccache for same target triple)
  build-release-m1:
    if: github.event_name == 'push'
    needs: build-release-fast
    runs-on: namespace-profile-tahoe
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Configure Namespace sccache cache
        run: nsc cache sccache setup --cache_name default >> "$GITHUB_ENV"
      - name: Cache Rust
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: rust
      - name: Build optimized release binary
        run: cargo build --release --target aarch64-apple-darwin
        env:
          RUSTFLAGS: "-C target-cpu=apple-m1 -C link-arg=-Wl,-dead_strip"
          RUSTC_WRAPPER: sccache
      - name: Strip and compress binary
        run: |
          strip target/aarch64-apple-darwin/release/repo-native-alignment
          tar czf repo-native-alignment-darwin-arm64.tar.gz -C target/aarch64-apple-darwin/release repo-native-alignment
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-native-alignment-darwin-arm64
          path: repo-native-alignment-darwin-arm64.tar.gz
          retention-days: 30


name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pull-requests: write

jobs:
  # M4-optimized build first — warms sccache for M1 baseline
  build-fast:
    runs-on: namespace-profile-tahoe
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$OSTYPE" == darwin* ]]; then
            sed -i '' 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
            sed -i '' 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json
          else
            sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
            sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json
          fi

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure Namespace sccache cache
        run: nsc cache sccache setup --cache_name default >> "$GITHUB_ENV"

      - name: Cache Rust
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: rust

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin
        env:
          RUSTFLAGS: "-C target-cpu=apple-m4 -C link-arg=-Wl,-dead_strip"
          RUSTC_WRAPPER: sccache

      - name: Strip and compress binary
        run: |
          strip target/aarch64-apple-darwin/release/repo-native-alignment
          tar czf repo-native-alignment-darwin-arm64-fast.tar.gz -C target/aarch64-apple-darwin/release repo-native-alignment

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-native-alignment-darwin-arm64-fast
          path: repo-native-alignment-darwin-arm64-fast.tar.gz

  # Linux builds in parallel with M4 (different runner, no shared cache)
  build-linux:
    runs-on: namespace-profile-cached
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure Namespace sccache cache
        run: nsc cache sccache setup --cache_name default >> "$GITHUB_ENV"

      - name: Cache Rust
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: rust

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu --no-default-features
        env:
          RUSTC_WRAPPER: sccache

      - name: Strip and compress binary
        run: |
          strip target/x86_64-unknown-linux-gnu/release/repo-native-alignment
          tar czf repo-native-alignment-linux-x86_64.tar.gz -C target/x86_64-unknown-linux-gnu/release repo-native-alignment

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-native-alignment-linux-x86_64
          path: repo-native-alignment-linux-x86_64.tar.gz

  # M1 baseline waits for M4 to warm sccache (same runner, same cache)
  build-m1:
    needs: build-fast
    runs-on: namespace-profile-tahoe
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          sed -i '' 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure Namespace sccache cache
        run: nsc cache sccache setup --cache_name default >> "$GITHUB_ENV"

      - name: Cache Rust
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: rust

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin
        env:
          RUSTFLAGS: "-C target-cpu=apple-m1 -C link-arg=-Wl,-dead_strip"
          RUSTC_WRAPPER: sccache

      - name: Strip and compress binary
        run: |
          strip target/aarch64-apple-darwin/release/repo-native-alignment
          tar czf repo-native-alignment-darwin-arm64.tar.gz -C target/aarch64-apple-darwin/release repo-native-alignment

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-native-alignment-darwin-arm64
          path: repo-native-alignment-darwin-arm64.tar.gz

  release:
    needs: [build-fast, build-linux, build-m1]
    runs-on: namespace-profile-cached

    steps:
      - name: Checkout (for tag annotation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use annotated tag message as release notes, fall back to auto-generated
          NOTES=$(git tag -l --format='%(contents)' "${{ github.ref_name }}" 2>/dev/null || echo "")
          if [ -n "$NOTES" ]; then
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --notes "$NOTES" \
              repo-native-alignment-darwin-arm64/repo-native-alignment-darwin-arm64.tar.gz \
              repo-native-alignment-darwin-arm64-fast/repo-native-alignment-darwin-arm64-fast.tar.gz \
              repo-native-alignment-linux-x86_64/repo-native-alignment-linux-x86_64.tar.gz
          else
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              repo-native-alignment-darwin-arm64/repo-native-alignment-darwin-arm64.tar.gz \
              repo-native-alignment-darwin-arm64-fast/repo-native-alignment-darwin-arm64-fast.tar.gz \
              repo-native-alignment-linux-x86_64/repo-native-alignment-linux-x86_64.tar.gz
          fi

  bump-source:
    needs: release
    runs-on: namespace-profile-cached

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch version in source
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json

      - name: Push version bump directly to main
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git add Cargo.toml .claude-plugin/marketplace.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "Version already at $VERSION; nothing to push."
            exit 0
          fi
          git commit -m "chore: bump version to $VERSION"
          git push origin main

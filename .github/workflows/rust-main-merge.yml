name: Rust CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: namespace-profile-default
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-build"
          cache-all-crates: true
          cache-on-failure: true

      - name: Run setup tests
        run: cargo test --no-default-features setup::tests
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      - name: Lint — no language-specific conditionals in generic.rs
        run: |
          if grep -n 'language_name ==' src/extract/generic.rs; then
            echo "FAIL: language-specific logic in generic.rs — use LangConfig fields"
            exit 1
          fi

      - name: Run full unit + integration tests
        run: cargo test --no-default-features
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      - name: Build release binary
        run: cargo build --release --no-default-features
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      - name: RNA pipeline smoke test (rna test)
        run: ./target/release/repo-native-alignment test --repo .
        timeout-minutes: 5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install MCP TypeScript SDK
        run: npm install --no-save @modelcontextprotocol/sdk

      - name: MCP stdio smoke test
        run: node .github/scripts/mcp-smoke.mjs ./target/release/repo-native-alignment .

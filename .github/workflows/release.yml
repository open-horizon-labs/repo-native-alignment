name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            features: ""
            artifact: repo-native-alignment-darwin-arm64
            rustflags: "-C target-cpu=apple-m1 -C link-arg=-Wl,-dead_strip"
          - os: macos-latest
            target: aarch64-apple-darwin
            features: ""
            artifact: repo-native-alignment-darwin-arm64-fast
            rustflags: "-C target-cpu=apple-m4 -C link-arg=-Wl,-dead_strip"
          - os: namespace-profile-default
            target: x86_64-unknown-linux-gnu
            features: "--no-default-features"
            artifact: repo-native-alignment-linux-x86_64
            rustflags: ""

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore file mtimes from git
        uses: chetan/git-restore-mtime-action@v2

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.target }}"
          cache-all-crates: true
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Strip and compress binary
        run: |
          strip target/${{ matrix.target }}/release/repo-native-alignment
          tar czf ${{ matrix.artifact }}.tar.gz -C target/${{ matrix.target }}/release repo-native-alignment

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: namespace-profile-default

    steps:
      - name: Checkout (for tag annotation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use annotated tag message as release notes, fall back to auto-generated
          NOTES=$(git tag -l --format='%(contents)' "${{ github.ref_name }}" 2>/dev/null || echo "")
          if [ -n "$NOTES" ]; then
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --notes "$NOTES" \
              repo-native-alignment-darwin-arm64/repo-native-alignment-darwin-arm64.tar.gz \
              repo-native-alignment-darwin-arm64-fast/repo-native-alignment-darwin-arm64-fast.tar.gz \
              repo-native-alignment-linux-x86_64/repo-native-alignment-linux-x86_64.tar.gz
          else
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              repo-native-alignment-darwin-arm64/repo-native-alignment-darwin-arm64.tar.gz \
              repo-native-alignment-darwin-arm64-fast/repo-native-alignment-darwin-arm64-fast.tar.gz \
              repo-native-alignment-linux-x86_64/repo-native-alignment-linux-x86_64.tar.gz
          fi

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            features: ""
            artifact: repo-native-alignment-darwin-arm64
            rustflags: "-C target-cpu=apple-m1 -C opt-level=3"
          - os: macos-latest
            target: aarch64-apple-darwin
            features: ""
            artifact: repo-native-alignment-darwin-arm64-m4
            rustflags: "-C target-cpu=apple-m4 -C opt-level=3"
          - os: namespace-profile-default
            target: x86_64-unknown-linux-gnu
            features: "--no-default-features"
            artifact: repo-native-alignment-linux-x86_64
            rustflags: ""

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.target }}-${{ matrix.artifact }}"
          cache-all-crates: true
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/repo-native-alignment

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/repo-native-alignment ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: namespace-profile-default

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            repo-native-alignment-darwin-arm64/repo-native-alignment-darwin-arm64 \
            repo-native-alignment-darwin-arm64-m4/repo-native-alignment-darwin-arm64-m4 \
            repo-native-alignment-linux-x86_64/repo-native-alignment-linux-x86_64

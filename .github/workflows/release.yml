name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: namespace-profile-tahoe
            target: aarch64-apple-darwin
            features: ""
            artifact: repo-native-alignment-darwin-arm64
            rustflags: "-C target-cpu=apple-m1 -C link-arg=-Wl,-dead_strip"
          - os: namespace-profile-tahoe
            target: aarch64-apple-darwin
            features: ""
            artifact: repo-native-alignment-darwin-arm64-fast
            rustflags: "-C target-cpu=apple-m4 -C link-arg=-Wl,-dead_strip"
          - os: namespace-profile-cached
            target: x86_64-unknown-linux-gnu
            features: "--no-default-features"
            artifact: repo-native-alignment-linux-x86_64
            rustflags: ""

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$OSTYPE" == darwin* ]]; then
            sed -i '' 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
            sed -i '' 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json
          else
            sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
            sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json
          fi

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure Namespace sccache cache
        run: nsc cache sccache setup --cache_name default >> "$GITHUB_ENV"

      - name: Cache Rust
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: rust

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          RUSTC_WRAPPER: sccache

      - name: Strip and compress binary
        run: |
          strip target/${{ matrix.target }}/release/repo-native-alignment
          tar czf ${{ matrix.artifact }}.tar.gz -C target/${{ matrix.target }}/release repo-native-alignment

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: namespace-profile-cached

    steps:
      - name: Checkout (for tag annotation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use annotated tag message as release notes, fall back to auto-generated
          NOTES=$(git tag -l --format='%(contents)' "${{ github.ref_name }}" 2>/dev/null || echo "")
          if [ -n "$NOTES" ]; then
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --notes "$NOTES" \
              repo-native-alignment-darwin-arm64/repo-native-alignment-darwin-arm64.tar.gz \
              repo-native-alignment-darwin-arm64-fast/repo-native-alignment-darwin-arm64-fast.tar.gz \
              repo-native-alignment-linux-x86_64/repo-native-alignment-linux-x86_64.tar.gz
          else
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              repo-native-alignment-darwin-arm64/repo-native-alignment-darwin-arm64.tar.gz \
              repo-native-alignment-darwin-arm64-fast/repo-native-alignment-darwin-arm64-fast.tar.gz \
              repo-native-alignment-linux-x86_64/repo-native-alignment-linux-x86_64.tar.gz
          fi

  bump-source:
    needs: release
    runs-on: namespace-profile-cached

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch version in source
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json

      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BRANCH="chore/bump-version-$VERSION"
          git checkout -b "$BRANCH"
          git add Cargo.toml .claude-plugin/marketplace.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: bump version to $VERSION"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: bump version to $VERSION" \
            --body "Auto-generated from release ${{ github.ref_name }}." \
            --base main \
            --head "$BRANCH")
          gh pr merge "$PR_URL" --squash --admin

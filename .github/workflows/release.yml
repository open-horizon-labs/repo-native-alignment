name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pull-requests: write

jobs:
  # M4-optimized build first — warms sccache for M1 baseline
  build-fast:
    runs-on: namespace-profile-tahoe
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$OSTYPE" == darwin* ]]; then
            sed -i '' 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
            sed -i '' 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json
          else
            sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
            sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json
          fi

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure Namespace sccache cache
        run: nsc cache sccache setup --cache_name default >> "$GITHUB_ENV"

      - name: Cache Rust
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: rust

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin
        env:
          RUSTFLAGS: "-C target-cpu=apple-m4 -C link-arg=-Wl,-dead_strip"
          RUSTC_WRAPPER: sccache

      - name: Strip and compress binary
        run: |
          strip target/aarch64-apple-darwin/release/repo-native-alignment
          tar czf repo-native-alignment-darwin-arm64-fast.tar.gz -C target/aarch64-apple-darwin/release repo-native-alignment

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-native-alignment-darwin-arm64-fast
          path: repo-native-alignment-darwin-arm64-fast.tar.gz

  # M1 baseline after M4 (shares sccache for same target triple)
  build-m1:
    needs: build-fast
    runs-on: namespace-profile-tahoe
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$OSTYPE" == darwin* ]]; then
            sed -i '' 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
            sed -i '' 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json
          else
            sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
            sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json
          fi
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Configure Namespace sccache cache
        run: nsc cache sccache setup --cache_name default >> "$GITHUB_ENV"
      - name: Cache Rust
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: rust
      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin
        env:
          RUSTFLAGS: "-C target-cpu=apple-m1 -C link-arg=-Wl,-dead_strip"
          RUSTC_WRAPPER: sccache
      - name: Strip and compress binary
        run: |
          strip target/aarch64-apple-darwin/release/repo-native-alignment
          tar czf repo-native-alignment-darwin-arm64.tar.gz -C target/aarch64-apple-darwin/release repo-native-alignment
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-native-alignment-darwin-arm64
          path: repo-native-alignment-darwin-arm64.tar.gz

  # Linux builds in parallel with M4 (no shared cache across architectures)
  build-linux:
    runs-on: namespace-profile-cached
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Configure Namespace sccache cache
        run: nsc cache sccache setup --cache_name default >> "$GITHUB_ENV"
      - name: Cache Rust
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: rust
      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu --no-default-features
        env:
          RUSTC_WRAPPER: sccache
      - name: Strip and compress binary
        run: |
          strip target/x86_64-unknown-linux-gnu/release/repo-native-alignment
          tar czf repo-native-alignment-linux-x86_64.tar.gz -C target/x86_64-unknown-linux-gnu/release repo-native-alignment
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-native-alignment-linux-x86_64
          path: repo-native-alignment-linux-x86_64.tar.gz

  release:
    needs: [build-fast, build-m1, build-linux]
    runs-on: namespace-profile-cached

    steps:
      - name: Checkout (for tag annotation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          ASSETS=(
            repo-native-alignment-darwin-arm64/repo-native-alignment-darwin-arm64.tar.gz
            repo-native-alignment-darwin-arm64-fast/repo-native-alignment-darwin-arm64-fast.tar.gz
            repo-native-alignment-linux-x86_64/repo-native-alignment-linux-x86_64.tar.gz
          )

          # If release already exists (e.g. created manually with notes), just upload artifacts
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release $TAG exists — uploading artifacts"
            gh release upload "$TAG" --repo "${{ github.repository }}" --clobber "${ASSETS[@]}"
          else
            # Create new release with auto-generated notes
            NOTES=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || echo "")
            if [ -n "$NOTES" ]; then
              gh release create "$TAG" --repo "${{ github.repository }}" --title "$TAG" --notes "$NOTES" "${ASSETS[@]}"
            else
              gh release create "$TAG" --repo "${{ github.repository }}" --title "$TAG" --generate-notes "${ASSETS[@]}"
            fi
          fi

  bump-source:
    needs: release
    runs-on: namespace-profile-cached

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch version in source
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' .claude-plugin/marketplace.json

      - name: Create version bump PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "Version already at $VERSION; nothing to do."
            exit 0
          fi
          BRANCH="chore/bump-$VERSION"
          git checkout -b "$BRANCH"
          git commit -m "chore: bump version to $VERSION"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: bump version to $VERSION" \
            --body "Auto-generated by release workflow after tagging v$VERSION." \
            --base main \
            --head "$BRANCH")
          gh pr merge "$PR_URL" --auto --squash

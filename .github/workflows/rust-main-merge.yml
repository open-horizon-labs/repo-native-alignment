name: Rust CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: namespace-profile-default
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache binary
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache with Namespace remote cache
        run: |
          # Stop the GHA-configured server, reconfigure for Namespace backend
          sccache --stop-server || true
          unset SCCACHE_GHA_ENABLED
          echo "SCCACHE_GHA_ENABLED=false" >> $GITHUB_ENV
          export $(nsc cache sccache setup --cache_name default)
          sccache --start-server
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "SCCACHE_WEBDAV_ENDPOINT=$SCCACHE_WEBDAV_ENDPOINT" >> $GITHUB_ENV
          echo "SCCACHE_WEBDAV_TOKEN=$SCCACHE_WEBDAV_TOKEN" >> $GITHUB_ENV

      - name: Lint — no language-specific conditionals in generic.rs
        run: |
          if grep -n 'language_name ==' src/extract/generic.rs; then
            echo "FAIL: language-specific logic in generic.rs — use LangConfig fields"
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release --no-default-features

      - name: Run all tests (release profile)
        run: cargo test --release --no-default-features

      - name: RNA pipeline smoke test (rna test)
        run: ./target/release/repo-native-alignment test --repo .
        timeout-minutes: 5

      - name: CLI search smoke test
        run: |
          OUTPUT=$(./target/release/repo-native-alignment search "main" --repo . --limit 3 2>/dev/null)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Symbol search" || { echo "FAIL: search returned no results"; exit 1; }

      - name: CLI graph smoke test
        run: |
          NODE_ID=$(./target/release/repo-native-alignment search "main" --repo . --limit 1 2>/dev/null | grep "ID:" | head -1 | sed 's/.*`\(.*\)`.*/\1/')
          echo "Node: $NODE_ID"
          OUTPUT=$(./target/release/repo-native-alignment graph --node "$NODE_ID" --mode neighbors --repo . 2>/dev/null)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "neighbors\|No results" || { echo "FAIL: graph returned unexpected output"; exit 1; }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MCP TypeScript SDK
        run: npm install --no-save @modelcontextprotocol/sdk

      - name: MCP stdio smoke test
        run: node .github/scripts/mcp-smoke.mjs ./target/release/repo-native-alignment .

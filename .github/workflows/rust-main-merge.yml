name: Rust CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run setup tests
        run: cargo test setup::tests

      - name: Lint — no language-specific conditionals in generic.rs
        run: |
          if grep -n 'language_name ==' src/extract/generic.rs; then
            echo "FAIL: language-specific logic in generic.rs — use LangConfig fields"
            exit 1
          fi

      - name: Run full unit + integration tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: RNA pipeline smoke test (rna test)
        run: ./target/release/repo-native-alignment test --repo .
        timeout-minutes: 5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install MCP TypeScript SDK
        run: npm install --no-save @modelcontextprotocol/sdk

      - name: MCP stdio smoke test
        run: node .github/scripts/mcp-smoke.mjs ./target/release/repo-native-alignment .

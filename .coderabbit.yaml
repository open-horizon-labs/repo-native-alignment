reviews:
  request_changes_workflow: true
  high_level_summary: true
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "src/**/*.rs"
      instructions: |
        PERFORMANCE: Flag these as blocking issues:
        - .iter().find() on Vec<Node>, Vec<Edge>, or any graph collection — must use HashMap
        - .clone() on Vec<Node> or Vec<Edge> — can it move instead?
        - Vec.contains() in a loop — should be HashSet
        - .to_string() for constant keys in loops — use static &str or const
        - Any O(N) work inside a loop over N items (O(N²))
        - Rebuilding data that's already cached (embed index, file index, artifact list)
        - cargo run instead of using the installed binary for testing
        - Full table drop+rebuild when incremental update with hash-skip would work

        EXTRACTION_VERSION: Flag these as blocking issues:
        - Any PR that adds a new post-extraction pass (e.g. nextjs_routing_pass, directory_module_pass, naming_convention_pass, manifest_pass) without bumping EXTRACTION_VERSION in src/graph/store.rs
        - Any PR that adds new metadata fields extracted from source files (doc_comment, is_async, churn_count, etc.) without bumping EXTRACTION_VERSION
        - Any PR that adds new EdgeKind or NodeKind variants produced at extraction time without bumping EXTRACTION_VERSION
        EXTRACTION_VERSION must be bumped any time new data is produced during extraction that would be missing from files scanned before the upgrade. Check src/graph/store.rs for the current value and the comment listing what each version added.

        POST-EXTRACTION PASS PERFORMANCE: Flag these as blocking issues:
        - Any new post-extraction pass (api_link, import_calls, manifest, etc.) that iterates over ALL nodes for EACH import/pattern (O(nodes × patterns)) instead of doing ONE pass over nodes to extract candidates then O(1) lookup — must use pre-indexed HashMaps or extract-once patterns
        - Any pass that calls body.contains(name) or similar string search inside a loop over imported names — must extract all call sites in ONE body pass then check against imports HashSet
        - Any PR adding a new post-extraction pass without a scan timing benchmark showing the pass adds <5% to total scan time on a 100k+ node repo
        - Shipping a feature as "done" without verifying it doesn't cause scan time regression

        ISSUE HYGIENE: Flag these as blocking issues:
        - Creating a new GitHub issue for a regression in an existing feature — must reopen the original issue instead
        - Creating a new GitHub issue for a poor/slow/broken implementation of a recently-merged feature — must fix directly or reopen the original issue
        - Any comment like "tracked as follow-up" or "filed new issue" for problems that were introduced by the current PR

        LANGUAGE GENERALITY: Flag these as blocking issues:
        - Any extraction feature, enrichment pass, or graph edge type that only works for one or two specific languages when the concept applies broadly across languages (e.g. module hierarchy applies to all languages, not just Rust; test coverage naming conventions work in Python/Go/Java/etc. too)
        - Hardcoding language names (e.g. "rust", "python") in feature logic that should be driven by LangConfig or file extensions
        - LSP-only implementations of features that could be derived from tree-sitter or file-path data alone (e.g. module hierarchy from directory structure, test coverage from naming conventions)
        - New EdgeKind or NodeKind variants that are only populated for a subset of languages without explicit documentation of why other languages are excluded

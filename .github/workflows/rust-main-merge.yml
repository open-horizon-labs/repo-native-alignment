name: Rust CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run setup tests
        run: cargo test setup::tests

      - name: Build binary
        run: cargo build --release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install MCP TypeScript SDK
        run: npm install --no-save @modelcontextprotocol/sdk

      - name: MCP stdio smoke test
        run: node .github/scripts/mcp-smoke.mjs ./target/release/repo-native-alignment .
